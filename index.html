<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSEE V12 | Motor de Ciclos</title>
    <style>
        :root { --glow: #00ffcc; --bg: #000; }
        body { background: var(--bg); color: #444; font-family: -apple-system, sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ui { text-align: center; width: 90%; max-width: 400px; z-index: 10; }
        h1 { font-weight: 200; letter-spacing: 5px; font-size: 0.8rem; color: var(--glow); margin-bottom: 30px; opacity: 0.6; }
        .timer { font-size: 4.5rem; font-family: 'Courier New', monospace; color: var(--glow); font-weight: bold; margin-bottom: 30px; }
        input[type="time"] { background: #0a0a0a; border: 1px solid #222; color: var(--glow); font-size: 3rem; padding: 15px; border-radius: 20px; text-align: center; width: 80%; margin-bottom: 30px; outline: none; }
        button { background: var(--glow); color: #000; border: none; padding: 20px; font-size: 1rem; font-weight: 800; border-radius: 50px; cursor: pointer; text-transform: uppercase; width: 100%; letter-spacing: 3px; }
        .status { font-size: 0.65rem; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; color: #666; }
        .blackout { opacity: 0 !important; }
        video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
    </style>
</head>
<body>

    <video id="iosLock" loop playsinline muted>
        <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAAhtZGF0" type="video/mp4">
    </video>

    <div class="ui" id="mainUI">
        <h1>SSEE V12 | CICLOS BIOLÓGICOS</h1>
        <div id="setup">
            <input type="time" id="wakeTime" value="05:15">
            <button id="btnStart">ACTIVAR MATRIZ</button>
        </div>
        <div id="active" style="display:none;">
            <div class="status" id="txtStatus">SINCRO...</div>
            <div class="timer" id="txtClock">00:00:00</div>
            <p style="font-size: 0.55rem; color: #333;">PI + PHI = OMEGA DNAV | Ciclos de 90 min Activos</p>
        </div>
    </div>

    <script>
        let audioCtx, masterGain, pianoNodes = [], isoModulator, wakeDate, startTime;
        const scale = [174.61, 220.00, 261.63, 329.63, 392.00]; 

        // Piano con armónicos y resonancia
        function playComplexNote(freq, time, filterFreq, volume) {
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();

            osc1.type = 'triangle'; osc2.type = 'sine';
            osc1.frequency.value = freq;
            osc2.frequency.value = freq * 1.005; // Detuning para dar grosor

            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(filterFreq, time);
            filter.frequency.exponentialRampToValueAtTime(50, time + 4);

            gain.gain.setValueAtTime(0, time);
            gain.gain.linearRampToValueAtTime(volume, time + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, time + 5);

            osc1.connect(filter); osc2.connect(filter);
            filter.connect(gain); gain.connect(masterGain);

            osc1.start(time); osc2.start(time);
            osc1.stop(time + 5); osc2.stop(time + 5);
        }

        document.getElementById('btnStart').onclick = async function() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            document.getElementById('iosLock').play();
            startTime = Date.now();

            const [h, m] = document.getElementById('wakeTime').value.split(':');
            wakeDate = new Date(); wakeDate.setHours(h, m, 0, 0);
            if (wakeDate <= new Date()) wakeDate.setDate(wakeDate.getDate() + 1);

            document.getElementById('setup').style.display = 'none';
            document.getElementById('active').style.display = 'block';

            masterGain = audioCtx.createGain();
            masterGain.gain.value = 0.5;
            masterGain.connect(audioCtx.destination);

            // Capa Biológica (Pulso base)
            const carrier = audioCtx.createOscillator();
            const vca = audioCtx.createGain();
            isoModulator = audioCtx.createOscillator();
            const modGain = audioCtx.createGain();
            carrier.type = 'sine'; carrier.frequency.value = 75; // Frecuencia grave cómoda
            isoModulator.frequency.value = 8; // Inicia en Alpha
            vca.gain.value = 0; modGain.gain.value = 0.4;
            isoModulator.connect(modGain); modGain.connect(vca.gain);
            carrier.connect(vca); vca.connect(masterGain);
            carrier.start(); isoModulator.start();

            // Pianista Inteligente
            function composer() {
                const diff = (wakeDate - new Date()) / 1000;
                if (diff <= 0) return;

                const elapsedSecs = (Date.now() - startTime) / 1000;
                const cyclePos = (elapsedSecs % 5400) / 5400; // Posición en el ciclo de 90 min

                let currentFreq, currentFilter, currentVol;

                if (diff < 3600) { // RAMPA DESPERTAR FINAL
                    currentFreq = 12 + ((1 - (diff/3600)) * 8); // De 12Hz a 20Hz
                    currentFilter = 2000; currentVol = 0.1;
                } else {
                    // LÓGICA DE CICLO DE 90 MINUTOS
                    if (cyclePos < 0.2) { // INDUCCIÓN (Alpha a Theta)
                        currentFreq = 10 - (cyclePos * 20); // Baja de 10 a 6Hz
                        currentFilter = 600; currentVol = 0.05;
                    } else if (cyclePos < 0.7) { // SUEÑO PROFUNDO (Delta)
                        currentFreq = 1.5; 
                        currentFilter = 150; currentVol = 0.02;
                    } else { // SUEÑO REM/LIGERO (Vuelve a subir)
                        currentFreq = 6 + ((cyclePos - 0.7) * 10); // Sube a 9Hz
                        currentFilter = 800; currentVol = 0.06;
                    }
                }

                isoModulator.frequency.setTargetAtTime(currentFreq, audioCtx.currentTime, 2);
                
                // Tocar nota de piano armónica
                const note = scale[Math.floor(Math.random() * scale.length)];
                playComplexNote(note * (currentFilter < 300 ? 0.5 : 1), audioCtx.currentTime, currentFilter, currentVol);

                setTimeout(composer, 6000 + Math.random() * 4000);
            }
            composer();

            function engine() {
                const diff = (wakeDate - new Date()) / 1000;
                if (diff <= 0) { document.getElementById('txtStatus').innerText = "VIGILIA TOTAL"; return; }
                
                const elapsedSecs = (Date.now() - startTime) / 1000;
                const cycleNum = Math.floor(elapsedSecs / 5400) + 1;
                const cyclePos = Math.round(((elapsedSecs % 5400) / 5400) * 100);

                document.getElementById('txtStatus').innerText = `CICLO ${cycleNum} (${cyclePos}%) | FREQ: ${isoModulator.frequency.value.toFixed(1)}Hz`;
                
                const d = new Date(diff * 1000);
                document.getElementById('txtClock').innerText = d.toISOString().substr(11, 8);
                requestAnimationFrame(engine);
            }
            engine();
        };

        document.body.onclick = () => {
            if (document.getElementById('active').style.display === 'block') {
                document.getElementById('mainUI').classList.toggle('blackout');
            }
        };
    </script>
</body>
</html>
