<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSEE VITA CORE</title>
    <style>
        :root { --glow: #00ffcc; --bg: #000; }
        body { background: var(--bg); color: var(--glow); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; -webkit-tap-highlight-color: transparent; }
        .ui { text-align: center; transition: opacity 0.8s; width: 100%; }
        h1 { font-weight: 200; letter-spacing: 4px; font-size: 0.8rem; margin-bottom: 30px; opacity: 0.5; }
        input[type="time"] { background: #111; border: 1px solid #333; color: var(--glow); font-size: 3.5rem; padding: 10px 20px; border-radius: 20px; text-align: center; outline: none; margin-bottom: 30px; -webkit-appearance: none; }
        .timer { font-size: 4rem; font-family: 'Courier New', monospace; font-weight: bold; margin: 20px 0; }
        button { background: var(--glow); color: #000; border: none; padding: 20px 50px; font-size: 1.1rem; font-weight: 800; border-radius: 50px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,255,204,0.2); }
        .status { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; color: #666; }
        .blackout { opacity: 0 !important; }
        #info { position: fixed; bottom: 20px; font-size: 0.6rem; opacity: 0.3; }
    </style>
</head>
<body>

    <audio id="silentAudio" loop><source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav"></audio>

    <div class="ui" id="mainUI">
        <h1>SSEE PROTOCOL V5</h1>
        <div id="setup">
            <input type="time" id="wakeTime" value="05:15">
            <br>
            <button id="btnStart">ACTIVAR PROTOCOLO</button>
        </div>
        <div id="active" style="display:none;">
            <div class="status" id="txtStatus">ESTABILIZANDO...</div>
            <div class="timer" id="txtClock">00:00:00</div>
            <p style="font-size: 0.7rem; opacity: 0.4;">Toca para modo oscuro total</p>
        </div>
    </div>

    <div id="info">BIO-ARQUITECTURA SSEE | MIKÆL-V</div>

    <script>
        let audioCtx, masterGain, rainGain, rainFilter, oscL, oscR;
        let wakeLock = null;

        // Configuración de Identidad para el Lock Screen del iPhone
        function setupMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: 'SSEE VITA: Bio-Despertador',
                    artist: 'MÏŒSLÅNKH',
                    album: 'Arquitectura del Sueño',
                    artwork: [{ src: 'https://via.placeholder.com/512/00ffcc/000000?text=VITA', sizes: '512x512', type: 'image/png' }]
                });
            }
        }

        async function activateWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
        }

        function createRain() {
            const bufferSize = 2 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            let lastOut = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                output[i] = (lastOut + (0.02 * white)) / 1.02; // Brown Noise
                lastOut = output[i];
                output[i] *= 3.5;
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;
            return source;
        }

        function birdChirp(time) {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.frequency.setValueAtTime(2000 + Math.random() * 3000, time);
            o.frequency.exponentialRampToValueAtTime(1000 + Math.random() * 1000, time + 0.1);
            g.gain.setValueAtTime(0, time);
            g.gain.linearRampToValueAtTime(0.05, time + 0.02);
            g.gain.linearRampToValueAtTime(0, time + 0.1);
            o.connect(g); g.connect(masterGain);
            o.start(time); o.stop(time + 0.1);
        }

        document.getElementById('btnStart').onclick = async function() {
            // Inicialización obligatoria por gesto
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            // Iniciar audio fantasma para mantener vivo el proceso
            const silent = document.getElementById('silentAudio');
            silent.play();

            await activateWakeLock();
            setupMediaSession();

            const [h, m] = document.getElementById('wakeTime').value.split(':');
            let wakeDate = new Date();
            wakeDate.setHours(h, m, 0, 0);
            if (wakeDate <= new Date()) wakeDate.setDate(wakeDate.getDate() + 1);

            document.getElementById('setup').style.display = 'none';
            document.getElementById('active').style.display = 'block';

            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.001, audioCtx.currentTime);
            masterGain.gain.exponentialRampToValueAtTime(0.7, audioCtx.currentTime + 3);
            masterGain.connect(audioCtx.destination);

            // Capa 1: Lluvia
            const rain = createRain();
            rainFilter = audioCtx.createBiquadFilter();
            rainGain = audioCtx.createGain();
            rainFilter.type = "lowpass";
            rain.connect(rainFilter); rainFilter.connect(rainGain); rainGain.connect(masterGain);
            rain.start();

            // Capa 2: Binaural
            oscL = audioCtx.createOscillator();
            oscR = audioCtx.createOscillator();
            const merger = audioCtx.createChannelMerger(2);
            oscL.connect(merger, 0, 0); oscR.connect(merger, 0, 1);
            merger.connect(masterGain);
            oscL.start(); oscR.start();

            function loop() {
                const diff = (wakeDate - new Date()) / 1000;
                if (diff <= 0) {
                    document.getElementById('txtStatus').innerText = "VIGILIA TOTAL";
                    return;
                }

                if (diff > 3600) { // SUEÑO
                    document.getElementById('txtStatus').innerText = "SSEE: REPARACIÓN (DELTA + LLUVIA)";
                    oscL.frequency.setTargetAtTime(174, audioCtx.currentTime, 2);
                    oscR.frequency.setTargetAtTime(175.5, audioCtx.currentTime, 2); 
                    rainGain.gain.setTargetAtTime(0.25, audioCtx.currentTime, 2);
                    rainFilter.frequency.setTargetAtTime(500, audioCtx.currentTime, 2);
                } else { // RAMPA DESPERTAR
                    const p = 1 - (diff / 3600);
                    document.getElementById('txtStatus').innerText = "SSEE: VITA ASCENDENTE (" + Math.round(p*100) + "%)";
                    oscL.frequency.setTargetAtTime(174 + (p * 400), audioCtx.currentTime, 2);
                    oscR.frequency.setTargetAtTime(oscL.frequency.value + (1.5 + (p * 18)), audioCtx.currentTime, 2);
                    rainGain.gain.setTargetAtTime(0.25 * (1 - p), audioCtx.currentTime, 2);
                    rainFilter.frequency.setTargetAtTime(500 + (p * 5000), audioCtx.currentTime, 2);
                    if (p > 0.6 && Math.random() > 0.985) birdChirp(audioCtx.currentTime);
                }

                const d = new Date(diff * 1000);
                document.getElementById('txtClock').innerText = d.toISOString().substr(11, 8);
                requestAnimationFrame(loop);
            }
            loop();
        };

        document.body.onclick = () => {
            if (document.getElementById('active').style.display === 'block') {
                document.getElementById('mainUI').classList.toggle('blackout');
            }
        };
    </script>
</body>
</html>
