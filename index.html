<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSEE VITA | Armonía Progresiva</title>
    <style>
        :root { --glow: #00ffcc; --bg: #000; }
        body { background: var(--bg); color: var(--glow); font-family: -apple-system, sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ui { text-align: center; transition: opacity 1s; width: 100%; padding: 20px; }
        h1 { font-weight: 200; letter-spacing: 5px; font-size: 0.9rem; opacity: 0.6; }
        input[type="time"] { background: #111; border: 1px solid #333; color: var(--glow); font-size: 3rem; padding: 15px; border-radius: 20px; text-align: center; width: 80%; margin-bottom: 30px; }
        .timer { font-size: 4rem; font-family: 'Courier New', monospace; margin: 20px 0; }
        button { background: var(--glow); color: #000; border: none; padding: 20px 60px; font-size: 1rem; font-weight: bold; border-radius: 50px; cursor: pointer; text-transform: uppercase; }
        .status { font-size: 0.7rem; letter-spacing: 2px; opacity: 0.4; margin-bottom: 10px; }
        .blackout { opacity: 0 !important; pointer-events: none; }
    </style>
</head>
<body>

    <audio id="bgAudio" loop><source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav"></audio>

    <div class="ui" id="mainUI">
        <h1>SSEE VITA | HARMONIC CORE</h1>
        <div id="setup">
            <input type="time" id="wakeTime" value="05:15">
            <br>
            <button id="btnStart">ACTIVAR CICLO</button>
        </div>
        <div id="active" style="display:none;">
            <div class="status" id="txtStatus">SINTONIZANDO ARMONÍAS...</div>
            <div class="timer" id="txtClock">00:00:00</div>
            <p style="font-size: 0.6rem; opacity: 0.5;">Toca para oscuridad total</p>
        </div>
    </div>

    <script>
        let audioCtx, masterGain, rainGain, rainFilter, pads = [], wakeLock = null;

        // Configuración para que iOS lo vea como un reproductor de música
        function setMediaMetadata() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: 'VITA: Ciclo de Sueño',
                    artist: 'SSEE Architecture',
                    album: 'Armonía 5D'
                });
            }
        }

        // Generador de Lluvia Orgánica (Pink Noise con LFO)
        function createRain() {
            const bufferSize = 2 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            let b0, b1, b2, b3, b4, b5, b6;
            b0 = b1 = b2 = b3 = b4 = b5 = b6 = 0.0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                output[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                output[i] *= 0.15;
                b6 = white * 0.115926;
            }
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;
            source.loop = true;
            return source;
        }

        // Sintetizador de Armónicos (Pads)
        function createPad(freq) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            const f = audioCtx.createBiquadFilter();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            f.type = 'lowpass';
            f.frequency.value = 300; 
            osc.connect(f); f.connect(g); g.connect(masterGain);
            osc.start();
            return { osc, filter: f, gain: g };
        }

        document.getElementById('btnStart').onclick = async function() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            document.getElementById('bgAudio').play(); // Activa el proceso de fondo
            setMediaMetadata();

            const [h, m] = document.getElementById('wakeTime').value.split(':');
            let wakeDate = new Date();
            wakeDate.setHours(h, m, 0, 0);
            if (wakeDate <= new Date()) wakeDate.setDate(wakeDate.getDate() + 1);

            document.getElementById('setup').style.display = 'none';
            document.getElementById('active').style.display = 'block';

            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
            masterGain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 4);
            masterGain.connect(audioCtx.destination);

            // Capa 1: Lluvia Orgánica
            const rain = createRain();
            rainFilter = audioCtx.createBiquadFilter();
            rainGain = audioCtx.createGain();
            rainFilter.type = "lowpass";
            rain.connect(rainFilter); rainFilter.connect(rainGain); rainGain.connect(masterGain);
            rain.start();

            // Capa 2: Tríada de Armonía (Acorde ambiental)
            pads.push(createPad(174)); // Nota base
            pads.push(createPad(217.5)); // Tercera mayor
            pads.push(createPad(261)); // Quinta
            
            // Capa 3: Oscilador Binaural sutil (Delta a Beta)
            const binaural = createPad(175.5);
            pads.push(binaural);

            function update() {
                const diff = (wakeDate - new Date()) / 1000;
                if (diff <= 0) return;

                if (diff > 3600) { // SUEÑO
                    document.getElementById('txtStatus').innerText = "ESTADO: SSEE_REPARACIÓN";
                    rainFilter.frequency.setTargetAtTime(400, audioCtx.currentTime, 2);
                    pads.forEach(p => p.filter.frequency.setTargetAtTime(250, audioCtx.currentTime, 2));
                } else { // DESPERTAR
                    const p = 1 - (diff / 3600);
                    document.getElementById('txtStatus').innerText = "VITA: ASCENSO ARMÓNICO (" + Math.round(p*100) + "%)";
                    rainFilter.frequency.setTargetAtTime(400 + (p * 6000), audioCtx.currentTime, 2);
                    pads.forEach(p => p.filter.frequency.setTargetAtTime(250 + (p * 3000), audioCtx.currentTime, 2));
                    binaural.osc.frequency.setTargetAtTime(174 + (1.5 + (p * 18)), audioCtx.currentTime, 2);
                }

                const s = Math.floor(diff % 60).toString().padStart(2, '0');
                const min = Math.floor((diff / 60) % 60).toString().padStart(2, '0');
                const hr = Math.floor(diff / 3600).toString().padStart(2, '0');
                document.getElementById('txtClock').innerText = `${hr}:${min}:${s}`;
                requestAnimationFrame(update);
            }
            update();
        };

        document.body.onclick = () => {
            if (document.getElementById('active').style.display === 'block') {
                document.getElementById('mainUI').classList.toggle('blackout');
            }
        };
    </script>
</body>
</html>
