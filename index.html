<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSEE V8 | Ingeniero de Realidad</title>
    <style>
        :root { --glow: #00ffcc; --bg: #000; }
        body { background: var(--bg); color: #888; font-family: -apple-system, sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ui { text-align: center; width: 90%; max-width: 400px; transition: opacity 1s; }
        h1 { font-weight: 200; letter-spacing: 5px; font-size: 0.9rem; color: var(--glow); margin-bottom: 20px; }
        .card { background: #0a0a0a; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        label { display: block; font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px; color: #555; text-transform: uppercase; }
        input[type="time"] { background: transparent; border: none; color: var(--glow); font-size: 3rem; text-align: center; outline: none; width: 100%; }
        select { background: #111; border: 1px solid #333; color: var(--glow); font-size: 1rem; padding: 12px; border-radius: 10px; width: 100%; outline: none; appearance: none; text-align: center; }
        .timer { font-size: 4rem; font-family: 'Courier New', monospace; margin: 15px 0; color: var(--glow); font-weight: bold; }
        button { background: var(--glow); color: #000; border: none; padding: 20px; font-size: 1rem; font-weight: 800; border-radius: 50px; cursor: pointer; text-transform: uppercase; width: 100%; letter-spacing: 2px; }
        .status { font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 5px; }
        .blackout { opacity: 0 !important; }
    </style>
</head>
<body>

    <audio id="silentAnchor" loop playsinline><source src="data:audio/wav;base64,UklGRigAAABXQVZFRm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav"></audio>

    <div class="ui" id="mainUI">
        <h1>SSEE VITA | ENGINE V8</h1>
        <div id="setup">
            <div class="card">
                <label>Despertar</label>
                <input type="time" id="wakeTime" value="05:15">
            </div>
            <div class="card">
                <label>Atmósfera</label>
                <select id="mode">
                    <option value="piano">Piano Onírico (Rhodes)</option>
                    <option value="rain">Lluvia Orgánica</option>
                    <option value="stream">Arroyo en Movimiento</option>
                </select>
            </div>
            <button id="btnStart">ACTIVAR PROTOCOLO</button>
        </div>

        <div id="active" style="display:none;">
            <div class="status" id="txtStatus">ESTABILIZANDO FRECUENCIAS...</div>
            <div class="timer" id="txtClock">00:00:00</div>
            <p style="font-size: 0.6rem;">Toca para oscuridad total. Audio en segundo plano activo.</p>
        </div>
    </div>

    <script>
        let audioCtx, masterGain, ambientGain, ambientFilter, isoGain, isoOsc;
        const notes = [174.61, 196.00, 220.00, 261.63, 293.66, 329.63]; // Escala Armónica

        function setMedia() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: 'SSEE VITA: Bio-Armonía',
                    artist: 'M.E.A.V. Protocol',
                    album: 'Ingeniería del Sueño'
                });
            }
        }

        // Generador de Ruido Rosa (Lluvia Realista)
        function createPinkNoise() {
            const bufferSize = 2 * audioCtx.sampleRate;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            let b0, b1, b2, b3, b4, b5, b6; b0=b1=b2=b3=b4=b5=b6=0;
            for (let i = 0; i < bufferSize; i++) {
                let white = Math.random() * 2 - 1;
                b0 = 0.99886 * b0 + white * 0.0555179;
                b1 = 0.99332 * b1 + white * 0.0750759;
                b2 = 0.96900 * b2 + white * 0.1538520;
                b3 = 0.86650 * b3 + white * 0.3104856;
                b4 = 0.55000 * b4 + white * 0.5329522;
                b5 = -0.7616 * b5 - white * 0.0168980;
                data[i] = b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362;
                data[i] *= 0.11; b6 = white * 0.115926;
            }
            const src = audioCtx.createBufferSource();
            src.buffer = buffer; src.loop = true;
            return src;
        }

        // Piano Sintetizado Armónico
        function playNote(freq, time, dur = 4) {
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            const f = audioCtx.createBiquadFilter();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(freq, time);
            f.type = 'lowpass';
            f.frequency.setValueAtTime(600, time);
            f.frequency.exponentialRampToValueAtTime(100, time + dur);
            g.gain.setValueAtTime(0, time);
            g.gain.linearRampToValueAtTime(0.08, time + 0.1);
            g.gain.exponentialRampToValueAtTime(0.001, time + dur);
            osc.connect(f); f.connect(g); g.connect(masterGain);
            osc.start(time); osc.stop(time + dur);
        }

        document.getElementById('btnStart').onclick = async function() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            document.getElementById('silentAnchor').play();
            setMedia();

            const wakeValue = document.getElementById('wakeTime').value;
            const [h, m] = wakeValue.split(':');
            let wakeDate = new Date();
            wakeDate.setHours(h, m, 0, 0);
            if (wakeDate <= new Date()) wakeDate.setDate(wakeDate.getDate() + 1);

            document.getElementById('setup').style.display = 'none';
            document.getElementById('active').style.display = 'block';

            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.6, audioCtx.currentTime);
            masterGain.connect(audioCtx.destination);

            const mode = document.getElementById('mode').value;
            
            // CAPA AMBIENTAL
            if (mode === 'rain' || mode === 'stream') {
                const noise = createPinkNoise();
                ambientFilter = audioCtx.createBiquadFilter();
                ambientGain = audioCtx.createGain();
                ambientFilter.type = 'lowpass';
                ambientFilter.frequency.value = (mode === 'rain') ? 400 : 800;
                noise.connect(ambientFilter); ambientFilter.connect(ambientGain);
                ambientGain.connect(masterGain);
                noise.start();
            }

            // MOTOR DE PIANO O CAPA BIOLÓGICA
            function pianoLoop() {
                const diff = (wakeDate - new Date()) / 1000;
                if (diff <= 0) return;
                if (mode === 'piano') {
                    const note = notes[Math.floor(Math.random() * notes.length)];
                    playNote(note * (diff > 3600 ? 0.5 : 1), audioCtx.currentTime + 0.5);
                }
                setTimeout(pianoLoop, 5000 + Math.random() * 5000);
            }
            pianoLoop();

            // CAPA ISOCRÓNICA (OCULTA)
            isoOsc = audioCtx.createOscillator();
            const isoVCA = audioCtx.createGain();
            const isoLFO = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            isoOsc.frequency.value = 75; // Frecuencia subgrave relajante
            isoLFO.frequency.value = 1.5; // Delta inicial
            lfoGain.gain.value = 0.5;
            isoLFO.connect(lfoGain); lfoGain.connect(isoVCA.gain);
            isoOsc.connect(isoVCA); isoVCA.connect(masterGain);
            isoOsc.start(); isoLFO.start();
            isoGain = isoVCA; // Referencia para el loop

            function update() {
                const diff = (wakeDate - new Date()) / 1000;
                if (diff <= 0) { document.getElementById('txtStatus').innerText = "VIGILIA COMPLETA"; return; }

                if (diff > 3600) {
                    document.getElementById('txtStatus').innerText = "ESTADO: REPARACIÓN SSEE";
                    isoLFO.frequency.setTargetAtTime(1.5, audioCtx.currentTime, 2);
                    if (ambientFilter) ambientFilter.frequency.setTargetAtTime(300, audioCtx.currentTime, 2);
                } else {
                    const p = 1 - (diff / 3600);
                    document.getElementById('txtStatus').innerText = "VITA: IGNICIÓN (" + Math.round(p*100) + "%)";
                    isoLFO.frequency.setTargetAtTime(1.5 + (p * 18.5), audioCtx.currentTime, 2);
                    if (ambientFilter) ambientFilter.frequency.setTargetAtTime(300 + (p * 4000), audioCtx.currentTime, 2);
                }

                const d = new Date(diff * 1000);
                document.getElementById('txtClock').innerText = d.toISOString().substr(11, 8);
                requestAnimationFrame(update);
            }
            update();
        };

        document.body.onclick = (e) => {
            if (document.getElementById('active').style.display === 'block' && e.target.tagName !== 'BUTTON') {
                document.getElementById('mainUI').classList.toggle('blackout');
            }
        };
    </script>
</body>
</html>
