<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSEE V11 | Tejedor de Sueños</title>
    <style>
        :root { --glow: #00ffcc; --bg: #000; }
        body { background: var(--bg); color: #444; font-family: -apple-system, sans-serif; height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .ui { text-align: center; width: 90%; max-width: 400px; z-index: 10; }
        h1 { font-weight: 200; letter-spacing: 5px; font-size: 0.8rem; color: var(--glow); margin-bottom: 30px; opacity: 0.7; }
        .timer { font-size: 4.5rem; font-family: 'Courier New', monospace; color: var(--glow); font-weight: bold; margin-bottom: 30px; text-shadow: 0 0 20px rgba(0,255,204,0.3); }
        input[type="time"] { background: #0a0a0a; border: 1px solid #222; color: var(--glow); font-size: 3rem; padding: 15px; border-radius: 20px; text-align: center; width: 80%; margin-bottom: 30px; outline: none; }
        button { background: var(--glow); color: #000; border: none; padding: 20px; font-size: 1rem; font-weight: 800; border-radius: 50px; cursor: pointer; text-transform: uppercase; width: 100%; letter-spacing: 3px; }
        .status { font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        .blackout { opacity: 0 !important; }
        video { position: fixed; top: 0; left: 0; width: 1px; height: 1px; opacity: 0.01; } /* Hack de video para iOS */
    </style>
</head>
<body>

    <video id="iosLock" loop playsinline muted>
        <source src="data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAAAhtZGF0" type="video/mp4">
    </video>

    <div class="ui" id="mainUI">
        <h1>SSEE V11 | NARRATIVA SÓNICA</h1>
        <div id="setup">
            <input type="time" id="wakeTime" value="05:15">
            <button id="btnStart">INICIAR HISTORIA</button>
        </div>
        <div id="active" style="display:none;">
            <div class="status" id="txtStatus">SINCRONIZANDO CON EL ARQUITECTO...</div>
            <div class="timer" id="txtClock">00:00:00</div>
            <p style="font-size: 0.6rem;">La historia ha comenzado. Puedes bloquear tu iPhone.</p>
        </div>
    </div>

    <script>
        let audioCtx, masterGain, chords = [], isoModulator, wakeDate;
        const scale = [174.61, 220.00, 261.63, 329.63]; // Acorde Fa Mayor 7 (Armonía Pura)

        function setMediaSession() {
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: 'Fábula Sónica SSEE',
                    artist: 'Ingeniería de Realidad',
                    album: 'VITA V11'
                });
            }
        }

        // Sintetizador Atmosférico (Notas que respiran)
        function createAtmosPad(freq) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            osc.type = 'triangle';
            osc.frequency.value = freq;
            
            filter.type = 'lowpass';
            filter.frequency.value = 200; // Sonido muy oscuro al inicio
            
            // LFO para que la nota "respire" (suba y baja de volumen)
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.value = 0.1; // Respiración muy lenta
            lfoGain.gain.value = 0.05;
            lfo.connect(lfoGain); lfoGain.connect(gain.gain);
            
            osc.connect(filter); filter.connect(gain); gain.connect(masterGain);
            
            osc.start(); lfo.start();
            return { osc, filter, gain };
        }

        document.getElementById('btnStart').onclick = async function() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            
            document.getElementById('iosLock').play(); // Activar persistencia
            setMediaSession();

            const [h, m] = document.getElementById('wakeTime').value.split(':');
            wakeDate = new Date();
            wakeDate.setHours(h, m, 0, 0);
            if (wakeDate <= new Date()) wakeDate.setDate(wakeDate.getDate() + 1);

            document.getElementById('setup').style.display = 'none';
            document.getElementById('active').style.display = 'block';

            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0, audioCtx.currentTime);
            masterGain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 5);
            masterGain.connect(audioCtx.destination);

            // Capa 1: Armonía Atmosférica (4 notas)
            scale.forEach(f => chords.push(createAtmosPad(f)));

            // Capa 2: Pulso Biológico (El narrador invisible)
            const carrier = audioCtx.createOscillator();
            const vca = audioCtx.createGain();
            isoModulator = audioCtx.createOscillator();
            const modGain = audioCtx.createGain();
            
            carrier.type = 'sine'; carrier.frequency.value = 85; // Pulso grave
            isoModulator.frequency.value = 1.5; // Delta inicial
            vca.gain.value = 0; modGain.gain.value = 0.5;
            isoModulator.connect(modGain); modGain.connect(vca.gain);
            carrier.connect(vca); vca.connect(masterGain);
            carrier.start(); isoModulator.start();

            function update() {
                const diff = (wakeDate - new Date()) / 1000;
                if (diff <= 0) return;

                // LÓGICA DE CICLOS PROPORCIONALES
                // Dividimos el tiempo en ciclos de 90 min (5400 seg)
                const currentCyclePosition = (diff % 5400) / 5400; 

                if (diff > 3600) {
                    // MODO SUEÑO: La historia es profunda y oscura
                    document.getElementById('txtStatus').innerText = "LA HISTORIA: EL ABISMO (DELTA)";
                    isoModulator.frequency.setTargetAtTime(1.5, audioCtx.currentTime, 5);
                    chords.forEach(p => p.filter.frequency.setTargetAtTime(150, audioCtx.currentTime, 5));
                } else {
                    // MODO DESPERTAR: La historia sale a la luz
                    const p = 1 - (diff / 3600);
                    document.getElementById('txtStatus').innerText = "LA HISTORIA: EL AMANECER (" + Math.round(p*100) + "%)";
                    isoModulator.frequency.setTargetAtTime(1.5 + (p * 18.5), audioCtx.currentTime, 5);
                    chords.forEach(p => p.filter.frequency.setTargetAtTime(150 + (p * 4000), audioCtx.currentTime, 5));
                }

                const s = Math.floor(diff % 60).toString().padStart(2, '0');
                const min = Math.floor((diff / 60) % 60).toString().padStart(2, '0');
                const hr = Math.floor(diff / 3600).toString().padStart(2, '0');
                document.getElementById('txtClock').innerText = `${hr}:${min}:${s}`;
                
                requestAnimationFrame(update);
            }
            update();
        };

        document.body.onclick = () => {
            if (document.getElementById('active').style.display === 'block') {
                document.getElementById('mainUI').classList.toggle('blackout');
            }
        };
    </script>
</body>
</html>
